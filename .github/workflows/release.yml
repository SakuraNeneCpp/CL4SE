name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: Stage release binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/clime.exe dist/clime-windows-x86_64.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: clime-windows-x86_64
          path: dist/clime-windows-x86_64.exe
          if-no-files-found: error

  build-macos:
    name: macOS universal
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build Apple Silicon binary
        run: cargo build --locked --release --target aarch64-apple-darwin

      - name: Build Intel binary
        run: cargo build --locked --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/clime \
            target/x86_64-apple-darwin/release/clime \
            -output dist/clime-macos-universal
          lipo -verify_arch arm64 x86_64 dist/clime-macos-universal
          chmod 755 dist/clime-macos-universal

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: clime-macos-universal
          path: dist/clime-macos-universal
          if-no-files-found: error

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu

      - name: Stage release binary
        run: install -Dm755 target/x86_64-unknown-linux-gnu/release/clime dist/clime-linux-x86_64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: clime-linux-x86_64
          path: dist/clime-linux-x86_64
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - build-windows
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum clime-* > SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi
